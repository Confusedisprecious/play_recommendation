name: 定时数据更新

on:
  schedule:
    # 每天 02:00, 08:00, 14:00, 20:00 执行 (北京时间 UTC+8)
    - cron: '0 18 * * *'   # 02:00 CST = 18:00 UTC
    - cron: '0 0 * * *'    # 08:00 CST = 00:00 UTC
    - cron: '0 6 * * *'    # 14:00 CST = 06:00 UTC
    - cron: '0 12 * * *'   # 20:00 CST = 12:00 UTC
  workflow_dispatch:  # 支持手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install httpx beautifulsoup4 lxml

      - name: 运行数据更新脚本
        run: |
          echo "📍 开始更新数据..."
          python scripts/update_all.py
          python scripts/generate_recommendation.py
          echo "✅ 数据更新完成"

      - name: 提交更新到仓库
        run: |
          git config user.name "auto-update-bot"
          git config user.email "bot@example.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "🔄 定时数据更新 $(date '+%Y-%m-%d %H:%M') [skip ci]"
          git push
