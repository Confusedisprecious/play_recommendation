name: 定时数据更新

on:
  schedule:
    # 每 2 小时刷新一次公开资讯；GitHub 调度高峰期可能有少量延迟。
    - cron: '17 */2 * * *'
  workflow_dispatch:  # 支持手动触发

concurrency:
  group: update-public-travel-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai
      UPDATE_INTERVAL_HOURS: '2'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install httpx beautifulsoup4 lxml

      - name: 运行数据更新脚本
        env:
          SEARXNG_BASE_URL: ${{ secrets.SEARXNG_BASE_URL }}
          RSSHUB_BASE_URL: ${{ secrets.RSSHUB_BASE_URL }}
        run: |
          echo "📍 开始更新数据..."
          python scripts/discover_social.py
          python scripts/update_all.py
          python scripts/generate_recommendation.py
          echo "✅ 数据更新完成"

      - name: 提交更新到仓库
        run: |
          git config user.name "auto-update-bot"
          git config user.email "bot@example.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "🔄 定时数据更新 $(date '+%Y-%m-%d %H:%M') [skip ci]"
          git push
