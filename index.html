<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="武汉亲子游玩推荐 — 按季节、区域、类别推荐武汉适合带小孩去的商场、游乐场、公园和大型活动">
  <meta name="theme-color" content="#FF7E36">
  <title>武汉亲子游玩推荐 — 周末带娃去哪玩</title>
  <style>
/* ===== 武汉亲子游玩推荐 - 样式 ===== */

/* ---- CSS Variables ---- */
:root {
  --primary: #FF7E36;
  --primary-light: #FFA366;
  --primary-dark: #E55D1A;
  --secondary: #4ECDC4;
  --secondary-light: #7EDDD6;
  --accent: #FFD93D;
  --accent-light: #FFE680;
  --bg: #FFFAF5;
  --bg-card: #FFFFFF;
  --bg-section: #FFF5EB;
  --text: #2D3436;
  --text-secondary: #636E72;
  --text-light: #B2BEC3;
  --border: #F0E6DC;
  --shadow: 0 2px 12px rgba(255, 126, 54, 0.1);
  --shadow-hover: 0 8px 30px rgba(255, 126, 54, 0.18);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --max-width: 1200px;
  --header-height: 64px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
}

/* ---- Reset ---- */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; border: none; background: none; }
img { max-width: 100%; display: block; }
ul { list-style: none; }

/* ---- Loading Screen ---- */
.loading-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.5s;
}
.loading-screen.hidden {
  opacity: 0;
  pointer-events: none;
}
.loading-spinner {
  width: 48px;
  height: 48px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text {
  margin-top: 16px;
  color: var(--text-secondary);
  font-size: 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- Header ---- */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: var(--header-height);
  background: rgba(255, 250, 245, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  z-index: 100;
  transition: var(--transition);
}
.header-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 20px;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
}
.logo-icon {
  font-size: 28px;
}
.logo-sub {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 400;
}

.header-nav {
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-nav a {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text-secondary);
  transition: var(--transition);
}
.header-nav a:hover {
  background: var(--bg-section);
  color: var(--primary);
}

/* Mobile Menu */
.mobile-menu-btn {
  display: none;
  font-size: 24px;
  padding: 8px;
  color: var(--text);
}
.mobile-menu {
  display: none;
  position: fixed;
  top: var(--header-height);
  left: 0;
  right: 0;
  background: var(--bg-card);
  border-bottom: 2px solid var(--border);
  padding: 16px 20px;
  transform: translateY(-100%);
  opacity: 0;
  transition: var(--transition);
  z-index: 99;
}
.mobile-menu.open {
  transform: translateY(0);
  opacity: 1;
}
.mobile-menu a {
  display: block;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  font-size: 16px;
  color: var(--text);
}
.mobile-menu a:last-child { border-bottom: none; }

/* ---- Hero Section ---- */
.hero {
  margin-top: var(--header-height);
  padding: 60px 20px 48px;
  background: linear-gradient(135deg, #FFF5EB 0%, #FFE8D6 50%, #FFEDE0 100%);
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 40%, rgba(255, 126, 54, 0.06) 0%, transparent 50%),
              radial-gradient(circle at 70% 60%, rgba(78, 205, 196, 0.06) 0%, transparent 50%);
  animation: heroFloat 20s ease-in-out infinite;
}
@keyframes heroFloat {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-20px, 20px); }
}

.hero-content {
  position: relative;
  max-width: 600px;
  margin: 0 auto;
}
.hero-title {
  font-size: clamp(24px, 5vw, 40px);
  font-weight: 800;
  color: var(--text);
  margin-bottom: 12px;
}
.hero-title span {
  color: var(--primary);
}
.hero-desc {
  font-size: clamp(14px, 2.5vw, 18px);
  color: var(--text-secondary);
  margin-bottom: 28px;
  line-height: 1.7;
}
.hero-season {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-card);
  padding: 8px 20px;
  border-radius: 100px;
  font-size: 14px;
  color: var(--text-secondary);
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.hero-season .season-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
.hero-season .season-dot.spring { background: #FFB7B2; }
.hero-season .season-dot.summer { background: #FF9A56; }
.hero-season .season-dot.autumn { background: #D4A373; }
.hero-season .season-dot.winter { background: #89B0D6; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Search */
.search-box {
  position: relative;
  max-width: 480px;
  margin: 0 auto;
}
.search-box input {
  width: 100%;
  padding: 14px 20px 14px 48px;
  border: 2px solid var(--border);
  border-radius: 100px;
  font-size: 16px;
  background: var(--bg-card);
  color: var(--text);
  outline: none;
  transition: var(--transition);
}
.search-box input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(255, 126, 54, 0.12);
}
.search-box .search-icon {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
  color: var(--text-light);
}
.search-box input::placeholder {
  color: var(--text-light);
}

/* ---- Section Layout ---- */
.section {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 40px 20px;
}
.section-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title .count {
  font-size: 14px;
  font-weight: 400;
  color: var(--text-secondary);
  background: var(--bg-section);
  padding: 2px 12px;
  border-radius: 100px;
}

/* ---- Season Tabs ---- */
.season-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding: 4px 0;
  scrollbar-width: none;
}
.season-tabs::-webkit-scrollbar { display: none; }

.season-tab {
  flex-shrink: 0;
  padding: 10px 24px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 500;
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  color: var(--text-secondary);
  transition: var(--transition);
  white-space: nowrap;
}
.season-tab:hover {
  border-color: var(--primary-light);
  color: var(--primary);
}
.season-tab.active {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
  box-shadow: 0 4px 12px rgba(255, 126, 54, 0.3);
}

/* ---- Category Tabs ---- */
.category-tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding: 4px 0;
  scrollbar-width: none;
}
.category-tabs::-webkit-scrollbar { display: none; }

.category-tab {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 500;
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  color: var(--text-secondary);
  transition: var(--transition);
}
.category-tab:hover {
  border-color: var(--secondary);
  color: var(--secondary);
}
.category-tab.active {
  background: var(--secondary);
  border-color: var(--secondary);
  color: white;
  box-shadow: 0 4px 12px rgba(78, 205, 196, 0.3);
}
.category-icon { font-size: 18px; }

/* ---- District Filter ---- */
.district-filter {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}
.district-chip {
  padding: 6px 16px;
  border-radius: 100px;
  font-size: 13px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  transition: var(--transition);
}
.district-chip:hover {
  border-color: var(--primary-light);
  color: var(--primary);
}
.district-chip.active {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}

/* ---- Results Grid ---- */
.results-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 20px;
}
.results-count {
  font-size: 14px;
  color: var(--text-secondary);
}

.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}

/* ---- Place Card ---- */
.place-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: var(--transition);
  opacity: 0;
  transform: translateY(20px);
}
.place-card.visible {
  opacity: 1;
  transform: translateY(0);
}
.place-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-4px);
}

.card-image {
  position: relative;
  height: 200px;
  overflow: hidden;
  background: #f5f5f5;
}
.card-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s;
}
.place-card:hover .card-image img {
  transform: scale(1.05);
}

.card-rating {
  position: absolute;
  top: 12px;
  left: 12px;
  display: flex;
  align-items: center;
  gap: 4px;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 4px 10px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  backdrop-filter: blur(4px);
}
.card-rating .star { color: var(--accent); }

.fav-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  font-size: 18px;
  transition: var(--transition);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.fav-btn:hover { transform: scale(1.15); }
.fav-btn.active { animation: heartPop 0.3s; }
@keyframes heartPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.25); }
  100% { transform: scale(1); }
}

.badge-deal {
  position: absolute;
  bottom: 12px;
  left: 12px;
  background: linear-gradient(135deg, #FF6B6B, #FF8E53);
  color: white;
  padding: 4px 12px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 600;
  box-shadow: 0 2px 8px rgba(255, 107, 107, 0.4);
}

.card-body {
  padding: 16px;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.tag {
  padding: 2px 10px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
}
.tag-district {
  background: #FFF0E6;
  color: var(--primary-dark);
}
.tag-season {
  background: #E8F8F5;
  color: #1ABC9C;
}
.tag-custom {
  background: #F5F0FF;
  color: #8B5CF6;
}

.card-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--text);
}
.card-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-events, .card-deals {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 8px;
  font-size: 13px;
}
.event-icon, .deal-icon { margin-right: 4px; }
.event-text { color: #8B5CF6; }
.deal-text {
  color: #E55D1A;
  font-weight: 500;
}
.card-events .event-text::before { content: '• '; }
.card-deals .deal-text::before { content: '• '; }

.card-meta {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 13px;
  color: var(--text-light);
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.nav-btn {
  margin-top: 6px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  background: #E8F4FD;
  color: #1A7DCB;
  transition: var(--transition);
  align-self: flex-start;
}
.nav-btn:hover { background: #D0EBFB; }

/* ---- Favorites Toggle ---- */
.fav-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 500;
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  color: var(--text-secondary);
  transition: var(--transition);
  flex-shrink: 0;
}
.fav-toggle:hover {
  border-color: #FF6B6B;
  color: #FF6B6B;
}
.fav-toggle.active {
  background: #FF6B6B;
  border-color: #FF6B6B;
  color: white;
  box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
}

/* ---- Empty State ---- */
.empty-state {
  text-align: center;
  padding: 60px 20px;
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; margin-bottom: 8px; }
.empty-state p { color: var(--text-secondary); font-size: 14px; }
.hidden { display: none !important; }

/* ---- Highlights / Carousel ---- */
.highlights-section {
  background: var(--bg-section);
}
.highlights-carousel {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-card);
  box-shadow: var(--shadow);
}

.highlights-track {
  position: relative;
  overflow: hidden;
}
.highlight-slide {
  display: none;
  animation: fadeSlideIn 0.5s ease;
}
.highlight-slide.active {
  display: block;
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}

.highlight-link {
  display: flex;
  flex-direction: row;
  min-height: 200px;
}
.highlight-img {
  width: 45%;
  flex-shrink: 0;
  overflow: hidden;
}
.highlight-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.highlight-info {
  flex: 1;
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.highlight-badge {
  display: inline-flex;
  align-self: flex-start;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  padding: 4px 14px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 12px;
}
.highlight-info h3 {
  font-size: clamp(18px, 3vw, 24px);
  font-weight: 700;
  margin-bottom: 8px;
}
.highlight-info p {
  color: var(--text-secondary);
  font-size: 14px;
  line-height: 1.6;
}

.highlights-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 16px;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border);
  transition: var(--transition);
}
.dot.active {
  background: var(--primary);
  width: 24px;
  border-radius: 4px;
}

/* ---- Scroll To Top ---- */
.scroll-top {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(255, 126, 54, 0.35);
  opacity: 0;
  transform: translateY(20px);
  transition: var(--transition);
  z-index: 50;
  pointer-events: none;
}
.scroll-top.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.scroll-top:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(255, 126, 54, 0.45);
}

/* ---- Toast ---- */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(45, 52, 54, 0.92);
  color: white;
  padding: 12px 24px;
  border-radius: 100px;
  font-size: 14px;
  opacity: 0;
  transition: var(--transition);
  z-index: 200;
  pointer-events: none;
  backdrop-filter: blur(8px);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ---- Footer ---- */
.footer {
  background: #2D3436;
  color: rgba(255,255,255,0.7);
  padding: 40px 20px 24px;
  margin-top: 40px;
}
.footer-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  text-align: center;
}
.footer-logo {
  font-size: 20px;
  font-weight: 700;
  color: white;
  margin-bottom: 8px;
}
.footer-desc {
  font-size: 14px;
  margin-bottom: 20px;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
}
.footer-links {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.footer-links a {
  font-size: 13px;
  transition: var(--transition);
}
.footer-links a:hover { color: white; }
.footer-copy {
  font-size: 12px;
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 16px;
}

/* ---- Responsive ---- */
@media (max-width: 768px) {
  :root { --header-height: 56px; }

  .header-nav { display: none; }
  .mobile-menu-btn { display: block; }
  .mobile-menu { display: block; }

  .hero { padding: 40px 16px 32px; }

  .section { padding: 24px 16px; }

  .results-grid {
    grid-template-columns: 1fr;
    gap: 16px;
  }

  .highlight-link {
    flex-direction: column;
  }
  .highlight-img {
    width: 100%;
    height: 180px;
  }
  .highlight-info {
    padding: 20px;
  }

  .card-image { height: 180px; }

  .season-tabs { gap: 6px; }
  .season-tab { padding: 8px 16px; font-size: 13px; }

  .category-tab { padding: 8px 14px; font-size: 13px; }
  .category-label { display: none; }

  .district-filter { gap: 6px; }
  .district-chip { padding: 5px 12px; font-size: 12px; }

  .scroll-top { bottom: 16px; right: 16px; width: 40px; height: 40px; }
  .toast { bottom: 70px; }
}

@media (min-width: 769px) and (max-width: 1024px) {
  .results-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* ---- Animations ---- */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in-up {
  animation: fadeInUp 0.5s ease forwards;
}

/* ---- Map Picker ---- */
.map-picker-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 300;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}

  </script>
  <script>
/**
 * 武汉亲子游玩推荐 - 应用逻辑
 */

// ===== 状态管理 =====
const state = {
  currentSeason: getCurrentSeason(),
  activeCategory: 'all',
  activeDistrict: 'all',
  searchQuery: '',
  showFavoritesOnly: false,
  favorites: JSON.parse(localStorage.getItem('wh-favorites') || '[]')
};

// ===== DOM 引用 =====
const $ = (sel, ctx = document) => ctx.querySelector(sel);
const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

const el = {
  app: $('#app'),
  header: $('#header'),
  hero: $('#hero'),
  seasonTabs: $('#season-tabs'),
  categoryTabs: $('#category-tabs'),
  districtFilter: $('#district-filter'),
  searchInput: $('#search-input'),
  resultsGrid: $('#results-grid'),
  resultsCount: $('#results-count'),
  highlights: $('#highlights'),
  highlightsTrack: $('#highlights-track'),
  highlightsDots: $('#highlights-dots'),
  featuredDeals: $('#featured-deals'),
  scrollTop: $('#scroll-top'),
  emptyState: $('#empty-state'),
  mobileMenuBtn: $('#mobile-menu-btn'),
  mobileMenu: $('#mobile-menu'),
  toast: $('#toast'),
  loading: $('#loading'),
  favToggle: $('#fav-toggle')
};

// ===== 初始化 =====
function init() {
  renderSeasonTabs();
  renderCategoryTabs();
  renderDistrictFilter();
  renderHighlights();
  setupEventListeners();
  filterAndRender();
  setupScrollAnimations();
  updateSeasonDot();
  setTimeout(() => {
    el.loading?.classList.add('hidden');
  }, 500);
}

// ===== 季节 Tab =====
function renderSeasonTabs() {
  el.seasonTabs.innerHTML = DATA.seasons.map(s => `
    <button class="season-tab ${s.id === state.currentSeason ? 'active' : ''}"
            data-season="${s.id}">
      ${s.label}
    </button>
  `).join('');
}

// ===== 分类 Tab =====
function renderCategoryTabs() {
  el.categoryTabs.innerHTML = DATA.categories.map(c => `
    <button class="category-tab ${c.id === state.activeCategory ? 'active' : ''}"
            data-category="${c.id}">
      <span class="category-icon">${c.icon}</span>
      <span class="category-label">${c.label}</span>
    </button>
  `).join('');
}

// ===== 区域筛选 =====
function renderDistrictFilter() {
  el.districtFilter.innerHTML = `
    <button class="district-chip ${state.activeDistrict === 'all' ? 'active' : ''}"
            data-district="all">全部区域</button>
    ${DATA.districts.map(d => `
      <button class="district-chip ${d === state.activeDistrict ? 'active' : ''}"
              data-district="${d}">${d}</button>
    `).join('')}
  `;
}

// ===== 搜索 =====
function setupSearch() {
  el.searchInput.addEventListener('input', (e) => {
    state.searchQuery = e.target.value.trim().toLowerCase();
    filterAndRender();
  });
}

// ===== 筛选与渲染 =====
function filterAndRender() {
  const results = filterPlaces();
  renderResults(results);
  updateFavBtnLabel();
  el.resultsCount.textContent = `找到 ${results.length} 个推荐去处`;
}

function filterPlaces() {
  let places = [...DATA.places];

  // 按季节筛选
  if (state.currentSeason) {
    places = places.filter(p => p.seasons.includes(state.currentSeason));
  }

  // 按分类筛选
  if (state.activeCategory !== 'all') {
    places = places.filter(p => p.category === state.activeCategory);
  }

  // 按区域筛选
  if (state.activeDistrict !== 'all') {
    places = places.filter(p => p.district === state.activeDistrict);
  }

  // 按搜索词筛选
  if (state.searchQuery) {
    const q = state.searchQuery;
    places = places.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.description.toLowerCase().includes(q) ||
      p.tags.some(t => t.toLowerCase().includes(q)) ||
      p.district.includes(q)
    );
  }

  // 收藏筛选（如果启用）
  if (state.showFavoritesOnly) {
    places = places.filter(p => state.favorites.includes(p.id));
  }

  // 按评分排序
  places.sort((a, b) => b.rating - a.rating);

  return places;
}

function renderResults(places) {
  if (places.length === 0) {
    el.resultsGrid.innerHTML = '';
    el.emptyState.classList.remove('hidden');
    return;
  }
  el.emptyState.classList.add('hidden');
  el.resultsGrid.innerHTML = places.map(p => createCard(p)).join('');

  // 绑定收藏按钮
  $$('.fav-btn', el.resultsGrid).forEach(btn => {
    btn.addEventListener('click', toggleFavorite);
  });

  // View animation
  requestAnimationFrame(() => {
    $$('.place-card', el.resultsGrid).forEach((card, i) => {
      setTimeout(() => card.classList.add('visible'), i * 50);
    });
  });
}

// ===== 卡片模板 =====
function createCard(place) {
  const isFav = state.favorites.includes(place.id);
  const seasonLabels = place.seasons.map(s => {
    const found = DATA.seasons.find(se => se.id === s);
    return found ? found.label.split(' ')[1] : s;
  }).join(' ');

  const hasDeals = place.deals && place.deals.length > 0;
  const hasEvents = place.events && place.events.length > 0;

  return `
    <article class="place-card" data-id="${place.id}" data-animate>
      <div class="card-image">
        <img src="${place.image}" alt="${place.name}" loading="lazy"
             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22><rect fill=%22%23f0f0f0%22 width=%22400%22 height=%22300%22/><text x=%22200%22 y=%22150%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2218%22>${encodeURIComponent(place.name)}</text></svg>'">
        <div class="card-rating">
          <span class="star">★</span> ${place.rating}
        </div>
        <button class="fav-btn ${isFav ? 'active' : ''}" data-id="${place.id}">
          ${isFav ? '❤️' : '🤍'}
        </button>
        ${hasDeals ? '<span class="badge-deal">有优惠</span>' : ''}
      </div>
      <div class="card-body">
        <div class="card-tags">
          <span class="tag tag-district">${place.district}</span>
          <span class="tag tag-season">${seasonLabels}</span>
          ${place.tags.slice(0, 2).map(t => `<span class="tag tag-custom">${t}</span>`).join('')}
        </div>
        <h3 class="card-title">${place.name}</h3>
        <p class="card-desc">${place.description}</p>

        ${hasEvents ? `
          <div class="card-events">
            <span class="event-icon">📅</span>
            ${place.events.slice(0, 2).map(e => `
              <span class="event-text">${e.text}</span>
            `).join('')}
          </div>
        ` : ''}

        ${hasDeals ? `
          <div class="card-deals">
            <span class="deal-icon">🏷️</span>
            ${place.deals.slice(0, 2).map(d => `
              <span class="deal-text">${d.text}</span>
            `).join('')}
          </div>
        ` : ''}

        <div class="card-meta">
          <span>📍 ${place.address}</span>
          <span>🕐 ${place.hours}</span>
          <button class="nav-btn" data-id="${place.id}" onclick="showMapPicker(${place.id})">🛣️ 导航</button>
        </div>
      </div>
    </article>
  `;
}

// ===== 收藏 =====
function toggleFavorite(e) {
  const btn = e.currentTarget;
  const id = parseInt(btn.dataset.id);
  const idx = state.favorites.indexOf(id);

  if (idx > -1) {
    state.favorites.splice(idx, 1);
    btn.textContent = '🤍';
    btn.classList.remove('active');
    showToast('已取消收藏');
  } else {
    state.favorites.push(id);
    btn.textContent = '❤️';
    btn.classList.add('active');
    showToast('已收藏 ❤️');
  }

  localStorage.setItem('wh-favorites', JSON.stringify(state.favorites));
}

// ===== 高亮/轮播 =====
let highlightIndex = 0;
let highlightTimer = null;

function renderHighlights() {
  // 筛选当前季节的高亮
  const items = DATA.highlights.filter(h =>
    h.season === 'all' || h.season === state.currentSeason
  );

  if (items.length === 0) {
    el.highlights.classList.add('hidden');
    return;
  }
  el.highlights.classList.remove('hidden');

  el.highlightsTrack.innerHTML = items.map((h, i) => `
    <div class="highlight-slide ${i === 0 ? 'active' : ''}" data-index="${i}">
      <a href="${h.link}" class="highlight-link">
        <div class="highlight-img">
          <img src="${h.image}" alt="${h.title}" onerror="this.style.display='none'">
        </div>
        <div class="highlight-info">
          <span class="highlight-badge">${h.badge}</span>
          <h3>${h.title}</h3>
          <p>${h.desc}</p>
        </div>
      </a>
    </div>
  `).join('');

  el.highlightsDots.innerHTML = items.map((_, i) => `
    <button class="dot ${i === 0 ? 'active' : ''}" data-index="${i}"></button>
  `).join('');

  startHighlightAutoPlay();
}

function goToHighlight(index) {
  const slides = $$('.highlight-slide', el.highlightsTrack);
  const dots = $$('.dot', el.highlightsDots);
  if (index >= slides.length) index = 0;
  if (index < 0) index = slides.length - 1;

  slides.forEach(s => s.classList.remove('active'));
  dots.forEach(d => d.classList.remove('active'));
  slides[index]?.classList.add('active');
  dots[index]?.classList.add('active');
  highlightIndex = index;
}

function startHighlightAutoPlay() {
  stopHighlightAutoPlay();
  highlightTimer = setInterval(() => {
    goToHighlight(highlightIndex + 1);
  }, 4000);
}

function stopHighlightAutoPlay() {
  if (highlightTimer) {
    clearInterval(highlightTimer);
    highlightTimer = null;
  }
}

// ===== Toast 消息 =====
function showToast(msg) {
  el.toast.textContent = msg;
  el.toast.classList.remove('hidden');
  el.toast.classList.add('show');
  clearTimeout(el.toast._timer);
  el.toast._timer = setTimeout(() => {
    el.toast.classList.remove('show');
    setTimeout(() => el.toast.classList.add('hidden'), 300);
  }, 2000);
}

// ===== 事件绑定 =====
function setupEventListeners() {
  // 季节切换
  el.seasonTabs.addEventListener('click', (e) => {
    const tab = e.target.closest('.season-tab');
    if (!tab) return;
    $$('.season-tab', el.seasonTabs).forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.currentSeason = tab.dataset.season;
    renderHighlights();
    filterAndRender();
  });

  // 分类切换
  el.categoryTabs.addEventListener('click', (e) => {
    const tab = e.target.closest('.category-tab');
    if (!tab) return;
    $$('.category-tab', el.categoryTabs).forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.activeCategory = tab.dataset.category;
    filterAndRender();
  });

  // 区域筛选
  el.districtFilter.addEventListener('click', (e) => {
    const chip = e.target.closest('.district-chip');
    if (!chip) return;
    $$('.district-chip', el.districtFilter).forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    state.activeDistrict = chip.dataset.district;
    filterAndRender();
  });

  // 搜索
  el.searchInput.addEventListener('input', (e) => {
    state.searchQuery = e.target.value.trim().toLowerCase();
    filterAndRender();
  });

  // 高亮轮播点击
  el.highlightsDots.addEventListener('click', (e) => {
    const dot = e.target.closest('.dot');
    if (!dot) return;
    stopHighlightAutoPlay();
    goToHighlight(parseInt(dot.dataset.index));
    startHighlightAutoPlay();
  });

  // 高亮触摸支持
  let touchStartX = 0;
  el.highlightsTrack.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    stopHighlightAutoPlay();
  }, { passive: true });

  el.highlightsTrack.addEventListener('touchend', (e) => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) {
      goToHighlight(highlightIndex + (diff > 0 ? 1 : -1));
    }
    startHighlightAutoPlay();
  }, { passive: true });

  // 收藏筛选切换
  el.favToggle.addEventListener('click', () => {
    state.showFavoritesOnly = !state.showFavoritesOnly;
    filterAndRender();
  });

  // 回到顶部
  window.addEventListener('scroll', () => {
    el.scrollTop.classList.toggle('visible', window.scrollY > 400);
  });
  el.scrollTop.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // 移动端菜单
  el.mobileMenuBtn.addEventListener('click', () => {
    el.mobileMenu.classList.toggle('open');
  });

  // 点击外部关闭菜单
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#mobile-menu') && !e.target.closest('#mobile-menu-btn')) {
      el.mobileMenu.classList.remove('open');
    }
  });

  // ESC 键关闭菜单
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') el.mobileMenu.classList.remove('open');
  });

  // 键盘导航
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') el.mobileMenu.classList.remove('open');
  });

  // 地图菜单
  document.querySelectorAll('.map-btn').forEach(btn => {
    btn.addEventListener('click', () => openMap(btn.dataset.map));
  });
  document.getElementById('map-picker-close').addEventListener('click', () => {
    document.getElementById('map-picker').classList.add('hidden');
  });
  document.getElementById('map-picker').addEventListener('click', (e) => {
    if (e.target.id === 'map-picker') document.getElementById('map-picker').classList.add('hidden');
  });
}

// ===== 收藏筛选按钮 =====
function updateFavBtnLabel() {
  const btn = el.favToggle;
  if (state.showFavoritesOnly) {
    btn.textContent = '❤️ 仅看收藏';
    btn.classList.add('active');
  } else {
    btn.textContent = '♡ 收藏 (' + state.favorites.length + ')';
    btn.classList.remove('active');
  }
}

// ===== 季节指示器 =====
function updateSeasonDot() {
  const dot = document.getElementById('season-dot');
  if (dot) dot.className = 'season-dot ' + state.currentSeason;
}

// ===== 滚动动画 =====
function setupScrollAnimations() {
  if ('IntersectionObserver' in window) {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '50px' });

    // 观察所有需要动画的元素
    setTimeout(() => {
      $$('[data-animate]').forEach(el => observer.observe(el));
    }, 600);
  }
}

// ===== 地图导航 =====
let mapTarget = null;

function showMapPicker(placeId) {
  const place = DATA.places.find(p => p.id === placeId);
  if (!place) return;
  mapTarget = place;
  document.getElementById('map-picker-title').textContent = '导航到 ' + place.name;
  document.getElementById('map-picker').classList.remove('hidden');
}

function openMap(type) {
  if (!mapTarget) return;
  const { name, address } = mapTarget;
  const q = encodeURIComponent(name + ' ' + address);
  const urls = {
    baidu: 'https://map.baidu.com/search/' + q + '/',
    amap: 'https://uri.amap.com/search?keyword=' + q + '&city=武汉',
    tencent: 'https://apis.map.qq.com/uri/v1/search?keyword=' + q + '&city=武汉'
  };
  window.open(urls[type], '_blank');
}

// ===== 启动 =====
document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
